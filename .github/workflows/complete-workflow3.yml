name: Build code, run unit test, run SAST, SCA, DAST security scans
on: push
permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Run unit tests and SAST scan on the source code 
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: maven
    - name: Run Sonar Analysis with cloud
      run:  mvn -B verify sonar:sonar -Dsonar.projectKey=vamsikrishnavk07 -Dsonar.organization=vamsikrishnavk07 -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=fc17c9a3d838881bf92f9835114e9b598a4a003b
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  security:
    runs-on: ubuntu-latest
    needs: build
    name: Run the SCA scan on the source code
    steps:
      - uses: actions/checkout@master
      - name: RunSnyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  zap_scan:
     runs-on: ubuntu-latest
 
    steps:

    - name: Checkout repository

      uses: actions/checkout@v4
 
    # Run ZAP Baseline Scan using Docker

    - name: ZAP Baseline Scan

      run: |

        docker run -t owasp/zap2docker-stable zap-baseline.py \

          -t http://www.itsecgames.com/

          -r zap-report.html \

          --exit-code-on-fail 0

      continue-on-error: true  # workflow continues even if alerts are found
 
    # Upload ZAP report

    - name: Upload ZAP Report

      uses: actions/upload-artifact@v4

      with:

        name: zap-report

        path: zap-report.html
